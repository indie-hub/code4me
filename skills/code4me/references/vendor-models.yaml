# Vendor -> Tier -> Concrete Model
#
# The orchestrator picks a tier per (subagent, weight) via `model-selection.yaml`.
# This file resolves a (vendor, tier) pair to the concrete model identifier the
# Task dispatch or bridge passes through.
#
# When a vendor ships a new model in a tier, edit this file — no agent file or
# orchestrator logic needs to change. Per-project overrides live at
# `.code4me/vendor-models.local.yaml` and merge by top-level section; local
# vendor tiers and reasonix_aliases keys win over this baseline when present.

anthropic:
  low:  claude-haiku-4-5
  mid:  claude-sonnet-5
  high: claude-opus-4-8
  # Explicit-only. Never selected by a low/mid/high default.
  frontier: claude-fable-5

openai:
  low:  gpt-5.6-luna
  mid:  gpt-5.6-terra
  high: gpt-5.6-sol

# DeepSeek bridge translates these concrete models to configured Reasonix
# provider aliases. See skills/deepseek-bridge/SKILL.md.
deepseek:
  low:  deepseek-v4-flash
  mid:  deepseek-v4-pro
  high: deepseek-v4-pro

# Concrete DeepSeek model -> Reasonix provider alias. A project-local custom
# model may override or add entries here. If absent, the bridge tries an alias
# identical to the concrete model ID and verifies it before dispatch.
reasonix_aliases:
  deepseek-v4-flash: deepseek-flash
  deepseek-v4-pro: deepseek-pro
