# Independent per-(subagent, weight) model-profile and effort defaults.
#
# Extracted from the prose in `model-selection.md` so the orchestrator can
# evaluate without parsing English. The prose stays as the human-facing
# explanation; this file is the authoritative machine-readable form.
#
# Model resolution order (see `cross-vendor-policy.md` Resolution algorithm):
#   1. Look up tier from `defaults[role][weight]` or `defaults[role]['any']`
#   2. Apply `hard_floors` (may upgrade)
#   3. Apply `deviation_rules` (may upgrade)
#   4. Resolve to concrete model via `vendor-models.yaml[vendor][tier]`
#
# Effort resolution is separate:
#   1. Use `effort_defaults[role][weight]` or `effort_defaults[role]['any']`
#   2. Apply `effort_rules` without changing the selected model
#   3. If an older caller supplies no effort, use `legacy_effort_fallback`

defaults:
  lead-architect:
    standard: high
    critical: high
  challenger-architect:
    standard: high
    critical: high
  spec-to-test:
    standard: mid
    critical: mid
  developer:
    conversation: low
    light: mid
    standard: mid
    critical: high
  combined-reviewer:
    conversation: low
    light: low
  verification:
    standard: mid
    critical: mid
  code-reviewer:
    standard: mid
    critical: high
  qa:
    standard: mid
    critical: mid
    bug_reproduction: low
  security-reviewer:
    standard: mid
    critical: high
  doc-writer:
    standard: mid
    critical: mid
  researcher:
    any: mid
    nuanced_comparison: high
  product-coach:
    any: mid
  # v0.10.4+: Trivial weight is inline orchestrator work — no subagent dispatch.
  # No tier resolution applies because no Task call fires; the orchestrator uses
  # its own session model (typically Opus) for the inline edit. See
  # references/trivial-classification.md for the whitelist + justification rules.
  # Recorded in dispatch log as subagent="orchestrator-inline (trivial)".
  #
  # v0.10+: Codex-side dispatches go through the codex-bridge skill, not subagents.
  # The bridge looks up the tier by (role, weight) using the same defaults as the
  # Claude-side roles above (e.g., codex-bridge architect at Critical resolves to
  # tier=high, same as lead-architect/challenger-architect). No separate entries
  # needed here — the orchestrator uses `(role, vendor=openai)` for the lookup,
  # mapping role names like `architect` / `developer` / `code-reviewer` /
  # `spec-to-test` / `security-reviewer` / `verification` / `lead-architect`
  # to the same tier defaults as their Claude-side counterparts.
  #
  # Historical note (pre-v0.10): codex-architect / codex-developer / etc. each had
  # their own entry here when they were subagent shims. v0.10 consolidated them
  # into the codex-bridge skill; tier resolution now goes through the underlying
  # role name (lead-architect, developer, etc.) regardless of vendor.

effort_defaults:
  lead-architect:
    standard: high
    critical: high
  challenger-architect:
    standard: high
    critical: high
  spec-to-test:
    standard: medium
    critical: medium
  developer:
    conversation: low
    light: medium
    standard: medium
    critical: high
  combined-reviewer:
    conversation: low
    light: low
  verification:
    standard: medium
    critical: medium
  code-reviewer:
    standard: medium
    critical: high
  qa:
    standard: medium
    critical: medium
    bug_reproduction: low
  security-reviewer:
    standard: medium
    critical: high
  doc-writer:
    standard: medium
    critical: medium
  researcher:
    any: medium
    nuanced_comparison: high
  product-coach:
    any: medium

effort_values:
  defaults: [low, medium, high]
  explicit_backend_supported_only: [xhigh, max]

legacy_effort_fallback:
  low: low
  mid: medium
  high: high
  effort_source: legacy_tier_fallback

hard_floors:
  - id: architect-not-low
    rule: "any role whose name contains 'architect' never runs at tier 'low'"
  - id: critical-not-low
    rule: "Critical Mode dispatches never run at tier 'low'"
  - id: auto-escalated-no-downgrade
    rule: "auto-escalated work: tier never downgraded below the resolved value"
  - id: cross-vendor-no-floor-relaxation
    rule: "cross-vendor pairing does not relax tier floors — a codex developer at Critical is still tier 'high'"

deviation_rules:
  - id: complexity-surprise
    trigger: "the work turned out to involve gnarly logic the spec didn't fully describe"
    action: "raise effort first; upgrade model tier only when capability, context, or tool support is the problem"
  - id: stakes-change-midflight
    trigger: "auto-escalation fires after dispatch begins"
    action: "reissue the Context Pack at the new weight's tier"
  - id: previous-attempt-failed
    trigger: "a subagent at the default tier produced a poor result and is being re-dispatched"
    action: "raise effort first; change model tier only when capability appears to be the problem"
  - id: user-requests-cheap
    trigger: "user explicitly asks for the cheapest viable model"
    action: "honour the request, but auto-escalation symptom-class work still gets at least 'mid' regardless"

effort_rules:
  - id: independent-from-model
    rule: "effort may deviate without changing model_tier or concrete model"
  - id: default-values
    rule: "automatic effort selection uses low, medium, or high"
  - id: extended-explicit-only
    rule: "xhigh and max require an explicit deviation and a backend that supports the value"
  - id: architecture-and-security-not-low
    rule: "architectural, security-sensitive, or Critical load-bearing decisions never use low effort"
  - id: failed-attempt
    rule: "after a poor result, raise effort first; change model only when capability is the problem"
  - id: backend-honesty
    rule: "record effort_applied=false when the selected backend cannot apply requested effort"

# Orchestrator runs Opus by recommendation (see model-selection.md §The orchestrator's own model).
# This is metadata only — the user picks the session model when they invoke the plugin.
orchestrator_recommended_tier: high
